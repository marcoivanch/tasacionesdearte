/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px;
  display: flex;
  justify-content: center;
  gap: 30px;
  background: rgba(10,15,28,0.85);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.nav a {
  color: #cbd5f5;
  text-decoration: none;
  font-size: 14px;
  white-space: nowrap;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  position:relative;
  padding-left:8%;
}

.hero::before{

  inset:0;
  background:url('Imagen perito bitácora.png') center center no-repeat;
  background-size:cover; /* 🔧 FIX imagen */
  opacity:0.85;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(10,15,28,0.75);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:500px;

  display:flex;
  flex-direction:column;
  align-items:flex-start;
  text-align:left;
}

/* H1 sans-serif */
.hero h1{

  font-size:42px;
  line-height:1.2;

}

.hero p{
  color:#94a3b8;
  margin-top:10px;
}

/* BOTÓN */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 26px;
  border-radius:30px;
  background:#25D366;
  color:#fff;
  text-decoration:none;
}

/* REDES */
.redes{
  margin-top:15px;
  display:flex;
  gap:14px;
}

.redes a{
  display:flex;
  align-items:center;
  justify-content:center;
  width:32px;
  height:32px;
  background:#020617;
  border-radius:6px;
  color:#94a3b8;
  text-decoration:none;
}

/* CONTENEDOR */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* DESTACADO */
.destacado {
  background: #020617;

  border-radius: 12px;
  padding: 30px;
  margin-bottom: 60px;
}

.destacado img {
  width: 100%;
  border-radius: 10px;
  margin: 20px 0;
}

/* NUEVOS ESTILOS PARA TÍTULOS */
.destacado h2.arquitectonico-sans {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 28px;
  margin: 0;
}

.indice h2.arquitectonico-sans-linea {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 28px;
  position: relative;
  display: inline-block;
  margin-bottom: 30px;
}

.indice h2.arquitectonico-sans-linea::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -8px;
  width: 100%;
  height: 2px;
  background-color: rgba(226, 232, 240, 0.4);
}

/* TARJETAS */
.card {
  display: flex;
  gap: 20px;
  border-top: 1px solid rgba(148,163,184,0.2);
  padding: 25px 0;
  align-items: center;
}

.card img {
  width: 120px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.card-content {
  flex: 1;
}

.card h3 {
  margin: 0 0 8px 0;
}

.card p {
  color: #94a3b8;
  margin: 0 0 8px 0;
}

.card a {
  color: #cbd5f5;
  text-decoration: none;
  font-size: 14px;
}
