<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensaje enviado</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0f1c;
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* CONTENEDOR */
.container{
  max-width:600px;
  padding:30px;
}

/* IMAGEN */
.img{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:25px;
  border:3px solid #25D366;
}

/* TITULO */
h1{
  font-size:24px;
  margin-bottom:10px;
  color:#25D366;
}

/* TEXTO */
p{
  color:#94a3b8;
  line-height:1.7;
  font-size:15px;
}

/* FIRMA */
.firma{
  margin-top:20px;
  font-size:14px;
  color:#cbd5f5;
}

/* BOTONES */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 22px;
  border-radius:25px;
  background:#25D366;
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* BOTÓN SECUNDARIO */
.btn2{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  border-radius:25px;
  background:#020617;
  border:1px solid rgba(148,163,184,0.2);
  color:#94a3b8;
  text-decoration:none;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <!-- FOTO -->
  <img src="secretaria.jpg" class="img">

  <!-- MENSAJE -->
  <h1>Mensaje enviado correctamente</h1>

  <p>
    Su mensaje se envió correctamente. Nos pondremos en contacto a la brevedad.
  </p>

  <p>
    El Perito de Arte Marco Cabrera agradece su preferencia.
  </p>

  <!-- FIRMA -->
  <div class="firma">
    Dominik Chumbile Romero<br>
    Secretaria
  </div>

  <!-- BOTÓN WHATSAPP -->
  <br>
  <a href="https://wa.me/51930046681" class="btn">
    Contactar por WhatsApp
  </a>

  <!-- VOLVER -->
  <br>
  <a href="index.html" class="btn2">
    Volver al inicio
  </a>

</div>

</body>
</html>
