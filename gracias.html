<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensaje enviado</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0f1c;
  color:#e2e8f0;
}

/* NAV (igual que index) */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  display:flex;
  justify-content:center;
  gap:30px;
  background:rgba(10,15,28,0.85);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.nav a{
  color:#cbd5f5;
  text-decoration:none;
  font-size:14px;
  white-space:nowrap;
}

/* CONTENEDOR GENERAL */
.wrapper{
  padding-top:100px;
  padding-bottom:40px;
  display:flex;
  justify-content:center;
}

/* CONTENIDO */
.container{
  max-width:600px;
  padding:20px;
  text-align:center;
}

/* IMAGEN */
.img{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:25px;
  border:3px solid #25D366;
}

/* TITULO */
h1{
  font-size:24px;
  margin-bottom:10px;
  color:#25D366;
}

/* TEXTO */
p{
  color:#94a3b8;
  line-height:1.7;
  font-size:15px;
}

/* FIRMA */
.firma{
  margin-top:20px;
  font-size:14px;
  color:#cbd5f5;
}

/* BOTONES */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 22px;
  border-radius:25px;
  background:#25D366;
  color:white;
  text-decoration:none;
  font-size:14px;
}

.btn2{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  border-radius:25px;
  background:#020617;
  border:1px solid rgba(148,163,184,0.2);
  color:#94a3b8;
  text-decoration:none;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){

  .nav{
    gap:15px;
    padding:12px;
    overflow-x:auto;
    justify-content:flex-start;
  }

  .nav a{
    font-size:13px;
  }

  .wrapper{
    padding-top:90px;
  }

  .img{
    width:140px;
    height:140px;
  }

  h1{
    font-size:20px;
  }

  p{
    font-size:14px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Inicio</a>
  <a href="bitacora.html">Bitácora profesional</a>
  <a href="ranking.html">Mercado del arte</a>
  <a href="contacto.html">Contacto</a>
</div>

<div class="wrapper">

  <div class="container">

    <!-- FOTO -->
    <img src="secretaria.jpg" class="img">

    <!-- MENSAJE -->
    <h1>Mensaje enviado correctamente</h1>

    <p>
      Su mensaje se envió correctamente. Nos pondremos en contacto a la brevedad.
    </p>

    <p>
      El Perito de Arte Marco Cabrera agradece su preferencia.
    </p>

    <!-- FIRMA -->
    <div class="firma">
      Dominik Chumbile Romero<br>
      Secretaria
    </div>

    <!-- BOTÓN WHATSAPP -->
    <a href="https://wa.me/51930046681" class="btn">
      Contactar por WhatsApp
    </a>

    <!-- VOLVER -->
    <br>
    <a href="index.html" class="btn2">
      Volver al inicio
    </a>

  </div>

</div>

</body>
</html>
