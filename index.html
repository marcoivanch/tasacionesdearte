<style>
body{
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#0a0f1c;

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  display:flex;
  justify-content:center;
  gap:30px;
  background:rgba(10,15,28,0.85);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.nav a{
  color:#cbd5f5;
  text-decoration:none;
  font-size:14px;
  white-space:nowrap;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
    content:"";
    position:absolute; inset:0;
    background:url('assets/index/Encuadernado.png') center no-repeat;
    background-size:130%;
    opacity:0.85;
}

.hero::after{
  content:"";
  position:absolute; inset:0;
  background:rgba(10,15,28,0.75);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:800px;
}

.hero h1{
  font-size:44px;
  font-weight:600;
}

.hero p{
  color:#94a3b8;
}

/* BOTÓN */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 26px;
  border-radius:30px;
  background:#25D366;
  color:#fff;
  text-decoration:none;
}

/* REDES */
.redes{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:14px;
}

.redes a{
  display:flex;
  align-items:center;
  justify-content:center;
  width:32px;
  height:32px;
  background:#020617;
  border-radius:6px;
  color:#94a3b8;
  text-decoration:none;
  font-size:14px;
}

/* SECCIONES */
.section{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:#020617;
  border:1px solid rgba(148,163,184,0.15);
  border-radius:12px;
  padding:35px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  gap:30px;
}

@media(min-width:768px){
  .grid-2{
    grid-template-columns:1fr 1fr;
  }
}

img{
  width:100%;
  border-radius:12px;
}

/* CONTACTO */
.contacto{
  text-align:center;
}

a.registro, a.correo{
  color:#94a3b8;
  text-decoration:none;
}

a.registro:hover, a.correo:hover{
  color:#cbd5f5;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  z-index: 1001;
}

/* ICONO DEFINICIÓN */
.info-icon {
  display: inline-block;
  width: 14px;
  height: 14px;
  background: rgba(71, 85, 105, 0.4);
  color: rgba(226, 232, 240, 0.7) !important;
  border-radius: 50%;
  text-align: center;
  font-size: 10px;
  line-height: 14px;
  font-family: serif;
  font-style: italic;
  font-weight: 300;
  position: relative;
  top: -8px;
  margin-left: 1px;
  text-decoration: none !important;
  transition: all 0.2s ease;
  vertical-align: baseline;
}

.info-icon:hover {
  background: rgba(71, 85, 105, 0.8);
  color: #fff !important;
}

/* MOBILE */
@media(max-width:768px){
  .nav{
    gap:15px;
    padding:12px;
    overflow-x:auto;
    justify-content:flex-start;
  }
  .nav a{ font-size:13px; }
  .hero h1{ font-size:30px; }
  .hero::before{ background-size:cover; background-position:center; }

  .info-icon {
    width: 11px;
    height: 11px;
    font-size: 8px;
    line-height: 11px;
    top: -6px;
    margin-left: 0px;
    background: rgba(71, 85, 105, 0.6);
  }
}
