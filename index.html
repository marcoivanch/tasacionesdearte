<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0f1c;
  color:#e2e8f0;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  display:flex;
  justify-content:center;
  gap:30px;
  background:rgba(10,15,28,0.85);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.nav a{
  color:#cbd5f5;
  text-decoration:none;
  font-size:14px;
  white-space:nowrap;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('Encuadernado.png') center no-repeat;
  background-size:130%;
  opacity:0.85;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(10,15,28,0.75);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:800px;
}

.hero h1{
  font-size:44px;
  font-weight:600;
}

.hero p{
  color:#94a3b8;
}

/* BOTÓN */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 26px;
  border-radius:30px;
  background:#25D366;
  color:#fff;
  text-decoration:none;
}

/* ICONOS HERO (desktop) */
.redes-hero{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:18px;
}

.redes-hero a{
  color:#94a3b8;
  transition:0.2s;
}

.redes-hero a:hover{
  color:#cbd5f5;
}

.redes-hero svg{
  width:18px;
  height:18px;
  fill:currentColor;
}

/* FLOAT MOBILE REDES */
.redes-float{
  position:fixed;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
  z-index:999;
}

.redes-float a{
  color:#94a3b8;
}

.redes-float svg{
  width:18px;
  height:18px;
  fill:currentColor;
}

/* SECCIONES */
.section{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:#020617;
  border:1px solid rgba(148,163,184,0.15);
  border-radius:12px;
  padding:35px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  gap:30px;
}

@media(min-width:768px){
  .grid-2{
    grid-template-columns:1fr 1fr;
  }
}

img{
  width:100%;
  border-radius:12px;
}

/* CONTACTO */
.contacto{
  text-align:center;
}

a.registro, a.correo{
  color:#94a3b8;
  text-decoration:none;
}

a.registro:hover, a.correo:hover{
  color:#cbd5f5;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){

  .nav{
    gap:15px;
    padding:12px;
    overflow-x:auto;
    justify-content:flex-start;
  }

  .nav a{
    font-size:13px;
  }

  .hero h1{
    font-size:30px;
  }

  .hero::before{
    background-size:cover;
  }

}

/* OCULTAR FLOAT EN DESKTOP */
@media(min-width:769px){
  .redes-float{
    display:none;
  }
}

/* OCULTAR HERO ICONOS EN MOBILE */
@media(max-width:768px){
  .redes-hero{
    display:none;
  }
}
</style>
