<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta profesional | Tasación de obras de arte</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0f1c;
  color:#e2e8f0;
}

.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  display:flex;
  justify-content:center;
  gap:30px;
  background:rgba(10,15,28,0.85);
  backdrop-filter:blur(10px);
}

.nav a{
  color:#cbd5f5;
  text-decoration:none;
  font-size:14px;
}

.container{
  max-width:720px;
  margin:120px auto 60px;
  padding:20px;
}

h1{text-align:center;}

form{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.field{
  display:flex;
  flex-direction:column;
}

label{
  font-size:13px;
  margin-bottom:6px;
}

input, select, textarea{
  padding:14px;
  border-radius:10px;
  background:#020617;
  color:#e2e8f0;
  border:1px solid rgba(148,163,184,0.2);
}

textarea{
  min-height:140px;
}

.radio-group{
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  padding:15px;
  border:none;
  border-radius:30px;
  background:#25D366;
  color:white;
}

.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  padding:14px;
  border-radius:50px;
  color:white;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Inicio</a>
  <a href="bitacora.html">Bitácora profesional</a>
  <a href="ranking.html">Mercado del arte</a>
  <a href="contacto.html">Contacto</a>
</div>

<div class="container">

<h1>Formulario de consulta</h1>

<form id="form" action="https://formsubmit.co/radiarte@hotmail.com" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://tasacionesdearte.org.pe/gracias.html">

<!-- NOMBRE -->
<div class="field">
<label>Nombre del solicitante</label>
<input type="text" name="Nombre" required>
</div>

<!-- NACIONALIDAD -->
<div class="field">
<label>Nacionalidad</label>
<select id="nacionalidad" name="Nacionalidad" required>
<option value="">Seleccione</option>
<option value="Peru">Perú</option>
<option value="Extranjero">Extranjero</option>
</select>
</div>

<!-- BLOQUE PERÚ -->
<div id="bloquePeru" style="display:none;">

<div class="field">
<label>Ubicación</label>
<select id="regionTipo" name="TipoRegion">
<option value="">Seleccione</option>
<option value="Lima Metropolitana">Lima Metropolitana</option>
<option value="Lima Provincias">Lima Provincias</option>
<option value="Región">Otras regiones</option>
</select>
</div>

<div class="field" id="distritosLima" style="display:none;">
<label>Distrito</label>
<select name="DistritoLima">
<option>Miraflores</option>
<option>San Isidro</option>
<option>Surco</option>
<option>La Molina</option>
<option>Otros</option>
</select>
</div>

<div class="field" id="limaProvincias" style="display:none;">
<label>Provincia</label>
<select name="ProvinciaLima">
<option>Cañete</option>
<option>Huaral</option>
<option>Barranca</option>
</select>
</div>

<div class="field" id="regionesPeru" style="display:none;">
<label>Región</label>
<select name="RegionPeru">
<option>Arequipa</option>
<option>Cusco</option>
<option>Piura</option>
<option>Otros</option>
</select>
</div>

</div>

<!-- EXTRANJERO -->
<div id="bloqueExtranjero" style="display:none;">
<div class="field">
<label>País</label>
<select name="PaisExtranjero">
<option>Estados Unidos</option>
<option>España</option>
<option>Argentina</option>
<option>Chile</option>
<option>Otro</option>
</select>
</div>
</div>

<!-- DOCUMENTO -->
<div class="field">
<label>Documento de identidad</label>
<div class="radio-group">
<label>DNI <input type="radio" name="TipoDocumento" value="DNI" required></label>
<label>RUC <input type="radio" name="TipoDocumento" value="RUC"></label>
<label>Pasaporte <input type="radio" name="TipoDocumento" value="Pasaporte"></label>
<label>CE <input type="radio" name="TipoDocumento" value="CE"></label>
</div>
</div>

<div class="field">
<label>Número de documento</label>
<input type="text" id="doc" name="NumeroDocumento" required>
</div>

<!-- EMAIL -->
<div class="field">
<label>Email</label>
<input type="email" name="Email" placeholder="ejemplo@correo.com" required>
</div>

<!-- CELULAR -->
<div class="field">
<label>Celular</label>
<div style="display:flex; gap:10px;">
<select name="CodigoPais">
<option value="+51" selected>+51 Perú</option>
<option value="+1">+1 USA</option>
<option value="+34">+34 España</option>
</select>

<input type="tel" name="Celular" pattern="[0-9]{9}" maxlength="9" placeholder="999999999" required>
</div>
</div>

<!-- TIPO SOLICITUD -->
<div class="field">
<label>Tipo de solicitud</label>
<select name="TipoSolicitud">
<option>Consulta profesional (diagnóstico)</option>
<option>Peritaje de obra de arte</option>
<option>Tasación de obra de arte</option>
<option>Asesoría / Consultoría</option>
<option>Información instituciones públicas</option>
<option>Información sector privado</option>
<option>Otro</option>
</select>
</div>

<!-- MENSAJE -->
<div class="field">
<label>Mensaje</label>
<textarea name="Mensaje"></textarea>
</div>

<!-- IMÁGENES -->
<div class="field">
<label>Envío de imágenes (opcional)</label>
<input type="file" name="Imagenes" multiple>
</div>

<button type="submit">Enviar Formulario</button>

</form>

</div>

<a class="whatsapp" href="https://wa.me/51930046681">WhatsApp</a>

<script>
// VALIDACIÓN DOCUMENTO
const form = document.getElementById('form');
const doc = document.getElementById('doc');

form.addEventListener('submit', function(e){
  const tipo = document.querySelector('input[name="TipoDocumento"]:checked');

  if(tipo){
    if(tipo.value === "DNI" && doc.value.length !== 8){
      alert("El DNI debe tener 8 dígitos");
      e.preventDefault();
    }
    if(tipo.value === "RUC" && doc.value.length !== 11){
      alert("El RUC debe tener 11 dígitos");
      e.preventDefault();
    }
  }
});

// LÓGICA NACIONALIDAD
const nacionalidad = document.getElementById('nacionalidad');
const bloquePeru = document.getElementById('bloquePeru');
const bloqueExtranjero = document.getElementById('bloqueExtranjero');

nacionalidad.addEventListener('change', ()=>{
  bloquePeru.style.display = 'none';
  bloqueExtranjero.style.display = 'none';

  if(nacionalidad.value === 'Peru'){
    bloquePeru.style.display = 'block';
  } else if(nacionalidad.value === 'Extranjero'){
    bloqueExtranjero.style.display = 'block';
  }
});

// SUBREGIONES
const regionTipo = document.getElementById('regionTipo');
const distritosLima = document.getElementById('distritosLima');
const limaProvincias = document.getElementById('limaProvincias');
const regionesPeru = document.getElementById('regionesPeru');

regionTipo.addEventListener('change', ()=>{
  distritosLima.style.display='none';
  limaProvincias.style.display='none';
  regionesPeru.style.display='none';

  if(regionTipo.value==="Lima Metropolitana"){
    distritosLima.style.display='block';
  }else if(regionTipo.value==="Lima Provincias"){
    limaProvincias.style.display='block';
  }else{
    regionesPeru.style.display='block';
  }
});
</script>

</body>
</html>
