<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta profesional | Tasación de obras de arte</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0f1c;
  color:#e2e8f0;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  display:flex;
  justify-content:center;
  gap:30px;
  background:rgba(10,15,28,0.85);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.nav a{
  color:#cbd5f5;
  text-decoration:none;
  font-size:14px;
  white-space:nowrap;
}

/* CONTENEDOR */
.container{
  max-width:720px;
  margin:120px auto 60px;
  padding:20px;
}

/* TITULO */
h1{
  text-align:center;
  font-weight:500;
  margin-bottom:8px;
}

.sub{
  text-align:center;
  color:#94a3b8;
  margin-bottom:15px;
  font-size:14px;
}

.disclaimer{
  text-align:center;
  font-size:12px;
  color:#64748b;
  margin-bottom:30px;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* BLOQUES */
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* DOBLE COLUMNA */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* LABEL */
label{
  font-size:12px;
  color:#cbd5f5;
}

/* INPUTS */
input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid rgba(148,163,184,0.2);
  background:#020617;
  color:#e2e8f0;
  font-size:14px;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:#25D366;
}

/* RADIO */
.radio-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:5px;
}

.radio-option{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}

/* TEXTAREA */
textarea{
  min-height:120px;
  resize:vertical;
}

/* BOTÓN */
button{
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:25px;
  background:#25D366;
  color:white;
  font-size:14px;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){

  .nav{
    gap:15px;
    padding:12px;
    overflow-x:auto;
    justify-content:flex-start;
  }

  .nav a{
    font-size:13px;
  }

  .row{
    grid-template-columns:1fr;
  }

  .radio-group{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Inicio</a>
  <a href="bitacora.html">Bitácora profesional</a>
  <a href="ranking.html">Mercado del arte</a>
  <a href="contacto.html">Contacto</a>
</div>

<div class="container">

  <h1>Consulta profesional</h1>

  <p class="sub">
    Inicie el proceso mediante una evaluación preliminar del caso.
  </p>

  <p class="disclaimer">
    La información proporcionada será tratada de forma confidencial. No genera obligación contractual.
  </p>

  <form action="https://formsubmit.co/radiarte@hotmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_cc" value="marcoivanbitel@gmail.com,oficina@tasacionesdearte.org.es">
    <input type="hidden" name="_next" value="https://tasacionesdearte.org.pe/gracias.html">

    <!-- NOMBRE -->
    <div class="field">
      <label>Nombre del solicitante</label>
      <input type="text" name="Nombre" required>
    </div>

    <!-- FILA -->
    <div class="row">

      <div class="field">
        <label>Nacionalidad</label>
        <input type="text" name="Nacionalidad" required>
      </div>

      <div class="field">
        <label>Número de documento</label>
        <input type="text" name="NumeroDocumento" required>
      </div>

    </div>

    <!-- DOCUMENTO -->
    <div class="field">
      <label>Documento de identidad</label>

      <div class="radio-group">

        <label class="radio-option">
          <input type="radio" name="TipoDocumento" value="DNI" required> DNI
        </label>

        <label class="radio-option">
          <input type="radio" name="TipoDocumento" value="RUC"> RUC
        </label>

        <label class="radio-option">
          <input type="radio" name="TipoDocumento" value="Pasaporte"> Pasaporte
        </label>

        <label class="radio-option">
          <input type="radio" name="TipoDocumento" value="CE"> CE
        </label>

      </div>
    </div>

    <!-- CONTACTO -->
    <div class="row">

      <div class="field">
        <label>Email</label>
        <input type="email" name="Email" required>
      </div>

      <div class="field">
        <label>Celular</label>
        <input type="text" name="Celular">
      </div>

    </div>

    <!-- MENSAJE -->
    <div class="field">
      <label>Descripción del caso</label>
      <textarea name="Mensaje"></textarea>
    </div>

    <button type="submit">Enviar consulta</button>

  </form>

</div>

<a class="whatsapp" href="https://wa.me/51930046681">
WhatsApp
</a>

</body>
</html>
