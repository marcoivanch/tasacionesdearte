<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmación de Registro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0a0f1c;
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* CARD */
.card{
  max-width:480px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:30px;
  text-align:center;
  backdrop-filter:blur(10px);
}

/* FOTO */
.card img{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:50%;
  margin-bottom:20px;
  border:2px solid rgba(255,255,255,0.15);
}

/* TEXTO */
.card h1{
  font-size:22px;
  margin-bottom:12px;
  color:#38bdf8;
}

.card p{
  font-size:15px;
  color:#cbd5f5;
  line-height:1.6;
  margin-bottom:0;
}
</style>
</head>

<body>

<div class="card">

  <img src="secretaria.jpg" alt="Secretaría Administrativa">

  <h1>Registro recibido correctamente</h1>

  <p>
    El área administrativa de la Oficina Profesional Tasaciones de Arte del perito Marco Cabrera confirma la recepción de su Reclamo/Queja.  
    Conforme a la normativa vigente, su caso será atendido dentro del plazo de ley.  
    Agradecemos su comunicación.
  </p>

</div>

</body>
</html>
