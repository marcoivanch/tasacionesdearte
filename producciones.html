<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producciones | Tasaciones de Arte</title>

    <link rel="stylesheet" href="../assets/css/estilos.css">

    <style>
        .hero {
            width: 100%;
            height: 380px;
            background-image: url("../assets/producciones/FP.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .contenedor {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .sub {
            font-size: 20px;
            color: #555;
            margin-bottom: 40px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card h3 {
            font-size: 22px;
            margin: 15px;
        }

        .card p {
            font-size: 16px;
            margin: 0 15px 20px 15px;
            color: #444;
        }

        .card a {
            display: block;
            margin: 0 15px 20px 15px;
            padding: 10px 15px;
            background: #000;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
        }

        .card a:hover {
            background: #333;
        }
    </style>
</head>

<body>

    <div class="hero"></div>

    <div class="contenedor">
        <h1>Producciones</h1>
        <div class="sub">Artistas peruanos</div>

        <div class="cards">

            <!-- Federico del Campo -->
            <div class="card">
                <img src="../assets/producciones/FDCminiatura.png" alt="Federico del Campo">
                <h3>Federico del Campo</h3>
                <p>Producciones, análisis y material audiovisual.</p>
                <a href="#">Ver contenido</a>
            </div>

            <!-- Francisco González Gamarra -->
            <div class="card">
                <img src="../assets/producciones/FGGminiatura.png" alt="Francisco González Gamarra">
                <h3>Francisco González Gamarra</h3>
                <p>Material documental y producciones curatoriales.</p>
                <a href="#">Ver contenido</a>
            </div>

        </div>
    </div>

</body>
</html>
